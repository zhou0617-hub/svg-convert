{% extends "base.html" %}

{% block title %}历史记录 | SVG 转换工坊{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/history.css') }}">
{% endblock %}

{% block content %}
<!-- 页面标题 -->
<div class="history-header">
    <div class="header-left">
        <h1>历史记录</h1>
        <p>查看和管理您的 SVG 转换记录</p>
    </div>
    <div class="header-actions">
        <button class="btn btn-ghost btn-sm" onclick="loadHistory()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                <polyline points="23 4 23 10 17 10"/>
                <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
            </svg>
            刷新
        </button>
        <button class="btn btn-danger btn-sm" onclick="batchDelete()" id="batchDeleteBtn" hidden>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
            </svg>
            删除选中
        </button>
    </div>
</div>

<!-- 批量操作栏 -->
<div class="batch-bar" id="batchBar" hidden>
    <div class="batch-left">
        <input type="checkbox" class="batch-checkbox" id="selectAll" onchange="toggleSelectAll()">
        <span class="batch-label">全选</span>
        <span class="batch-count" id="batchCount"></span>
    </div>
</div>

<!-- 历史记录网格 -->
<div class="history-grid" id="historyGrid">
    <div class="loading-state">
        <div class="spinner"></div>
        <p>加载中...</p>
    </div>
</div>

<!-- 空状态 -->
<div class="empty-state" id="historyEmpty" hidden>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="64" height="64">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
    </svg>
    <h3>还没有转换记录</h3>
    <p>快去转换一张图片吧</p>
    <a href="/" class="btn btn-primary btn-sm">去转换</a>
</div>

<!-- 重命名弹窗 -->
<div class="modal" id="renameModal">
    <div class="modal-backdrop" onclick="hideModal('renameModal')"></div>
    <div class="modal-content" style="max-width: 400px;">
        <div class="modal-header">
            <h3>重命名</h3>
            <button class="modal-close" onclick="hideModal('renameModal')">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>新名称</label>
                <input type="text" id="renameInput" placeholder="输入新名称" maxlength="50">
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                <button class="btn btn-ghost btn-sm" onclick="hideModal('renameModal')">取消</button>
                <button class="btn btn-primary btn-sm" onclick="confirmRename()">确认</button>
            </div>
        </div>
    </div>
</div>

<!-- SVG 预览弹窗 -->
<div class="modal modal-lg" id="svgModal">
    <div class="modal-backdrop" onclick="hideModal('svgModal')"></div>
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="svgModalTitle">SVG 详情</h3>
            <button class="modal-close" onclick="hideModal('svgModal')">&times;</button>
        </div>
        <div class="modal-body">
            <div class="svg-preview-large" id="svgPreviewLarge"></div>
            <textarea class="svg-code" id="svgCode" readonly></textarea>
            <div class="modal-actions">
                <button class="btn btn-ghost btn-sm" onclick="copySvgFromModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                        <rect x="9" y="9" width="13" height="13" rx="2"/>
                        <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                    </svg>
                    复制代码
                </button>
                <button class="btn btn-primary btn-sm" onclick="downloadSvgFromModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    下载 SVG
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/history.js') }}"></script>
{% endblock %}
