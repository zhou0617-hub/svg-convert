<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 | SVG 转换工坊</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}?v=3">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}?v=3">
</head>
<body>
    <!-- Three.js 背景 -->
    <canvas id="three-bg" style="position:fixed;inset:0;z-index:0;pointer-events:none;"></canvas>

    <div class="login-container">
        <div class="login-card">
            <!-- 左侧装饰 -->
            <div class="login-left">
                <div class="brand">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                    <span>SVG 转换工坊</span>
                </div>
                <h1>让每一张图片<br>都成为矢量艺术</h1>
                <p>智能 AI 算法，秒级完成图片到 SVG 的高质量转换</p>
                <div class="features">
                    <div class="feature">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                            <path d="M13 2L3 14h9l-1 8 10-5-10-5z"/>
                        </svg>
                        <span>极速转换</span>
                    </div>
                    <div class="feature">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        </svg>
                        <span>隐私安全</span>
                    </div>
                    <div class="feature">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0110 0v4"/>
                        </svg>
                        <span>本地处理</span>
                    </div>
                </div>
            </div>

            <!-- 右侧表单 -->
            <div class="login-right">
                <div class="form-header">
                    <h2>欢迎回来</h2>
                    <p>登录您的账号</p>
                </div>

                <form onsubmit="event.preventDefault(); handleLogin(event);">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" name="username" required placeholder="请输入用户名" autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" name="password" required placeholder="请输入密码" autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
                        <span class="btn-text">登录</span>
                        <span class="spinner" hidden></span>
                    </button>
                </form>

                <div class="form-switch">
                    <span>还没有账号？</span>
                    <a href="/register">立即注册</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toastContainer"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="{{ url_for('static', filename='js/three-bg.js') }}"></script>
<script src="{{ url_for('static', filename='js/core.js') }}?v=1"></script>
<script src="{{ url_for('static', filename='js/login.js') }}?v=1"></script>
</body>
</html>
